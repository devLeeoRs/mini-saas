services:
  ferragem:
    build: .
    container_name: ferragem_app
    restart: unless-stopped
    # Env vars injected into the container (the backend image does not ship a .env file)
    env_file: .env
    environment:
      # Uazapi (WhatsApp)
      - UAZAPI_SUBDOMAIN=${UAZAPI_SUBDOMAIN}
      - UAZAPI_TOKEN=${UAZAPI_TOKEN}
    volumes:
      # Persiste os dados JSON entre deploys
      - ./backend/data:/app/backend/data
    networks:
      - n8n_default        # Rede do Traefik (para roteamento HTTP/HTTPS)
      - postgres-docker_postgres_net       # Rede do PostgreSQL
    labels:
      - "traefik.enable=true"
      # ── HTTPS ──────────────────────────────────────────────────────────────
      - "traefik.http.routers.ferragem.rule=Host(`api.ferragemoliveira.com.br`)"
      - "traefik.http.routers.ferragem.entrypoints=websecure"
      # ATENÇÃO: verifique o nome do certresolver no docker-compose do n8n
      # (geralmente "letsencrypt" ou "myresolver")
      - "traefik.http.routers.ferragem.tls.certresolver=letsencrypt"
      - "traefik.http.services.ferragem.loadbalancer.server.port=3001"
      # ── HTTP → HTTPS redirect ───────────────────────────────────────────────
      - "traefik.http.routers.ferragem-http.rule=Host(`api.ferragemoliveira.com.br`)"
      - "traefik.http.routers.ferragem-http.entrypoints=web"
      - "traefik.http.routers.ferragem-http.middlewares=ferragem-https"
      - "traefik.http.middlewares.ferragem-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ferragem-https.redirectscheme.permanent=true"

networks:
  n8n_default:
    external: true
